---
name: Release

on:
  push:
    tags:
      - '[0-9]*'   # Matches: 1, 2, 1.0, 1.2.3, etc.
      - 'v[0-9]*'  # Matches: v1, v1.2, v1.2.3, etc.

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in facturascripts.ini
        run: sed -i "s/^version.*/version = ${{ steps.version.outputs.VERSION }}/" facturascripts.ini

      - name: Create ZIP using git archive
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add facturascripts.ini
          git commit -m "Update version to ${{ steps.version.outputs.VERSION }}" || true
          git archive --format=zip --prefix=PluginTemplate/ HEAD -o PluginTemplate-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PluginTemplate-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
