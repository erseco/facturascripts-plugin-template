---
name: Release

on:
  push:
    tags:
      # FacturaScripts only accepts integer or single-decimal versions
      # (e.g. 7 or 7.1). Triple-dot (1.0.1) and pre-release (1.0-beta)
      # tags are intentionally NOT matched.
      - '[0-9]+'
      - '[0-9]+.[0-9]+'
      - 'v[0-9]+'
      - 'v[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in facturascripts.ini
        run: sed -i "s/^version.*/version = ${{ steps.version.outputs.VERSION }}/" facturascripts.ini

      - name: Create ZIP using git archive
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add facturascripts.ini
          git commit -m "Update version to ${{ steps.version.outputs.VERSION }}" || true
          git archive --format=zip --prefix=PluginTemplate/ HEAD -o PluginTemplate-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: PluginTemplate-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true

      # When forking this template, update plugin-slug to the slug your
      # plugin is registered under on https://facturascripts.com/forja.
      - name: Publish to FacturaScripts forja
        uses: erseco/action-facturascripts-publicar-forja@v1
        with:
          plugin-slug: plugintemplate
          zip-path: PluginTemplate-${{ steps.version.outputs.VERSION }}.zip
          version: ${{ steps.version.outputs.VERSION }}
          status: stable
          forja-user: ${{ secrets.FS_FORJA_USER }}
          forja-password: ${{ secrets.FS_FORJA_PASSWORD }}
